name: Update PostHog Downloads Insight

on:
  release:
      types: [published]
        schedule:
            - cron: '0 */6 * * *'
              workflow_dispatch:

              jobs:
                update-posthog:
                    runs-on: ubuntu-latest
                        steps:
                              - name: Fetch GitHub releases and update PostHog insight
                                      env:
                                                POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
                                                        run: |
                                                                  python3 << 'EOF'
                                                                            import json, urllib.request, os

                                                                                      req = urllib.request.Request(
                                                                                                    "https://api.github.com/repos/sudip-mondal-2002/Amplitron/releases",
                                                                                                                  headers={"User-Agent": "GitHub-Actions"}
                                                                                                                            )
                                                                                                                                      with urllib.request.urlopen(req) as resp:
                                                                                                                                                    releases = json.loads(resp.read())
                                                                                                                                                    
                                                                                                                                                              linux = macos = windows = 0
                                                                                                                                                                        for release in releases:
                                                                                                                                                                                      for asset in release.get("assets", []):
                                                                                                                                                                                                        name = asset["name"]
                                                                                                                                                                                                                          count = asset["download_count"]
                                                                                                                                                                                                                                            if "Linux" in name:
                                                                                                                                                                                                                                                                  linux += count
                                                                                                                                                                                                                                                                                    elif "macOS" in name:
                                                                                                                                                                                                                                                                                                          macos += count
                                                                                                                                                                                                                                                                                                                            elif "Windows" in name:
                                                                                                                                                                                                                                                                                                                                                  windows += count
                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                            print(f"Linux: {linux}, macOS: {macos}, Windows: {windows}")
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                      sql = (
                                                                                                                                                                                                                                                                                                                                                                                    "-- Auto-updated from https://api.github.com/repos/sudip-mondal-2002/Amplitron/releases\n"
                                                                                                                                                                                                                                                                                                                                                                                                  f"SELECT 'Linux' AS operating_system, {linux} AS download_count\n"
                                                                                                                                                                                                                                                                                                                                                                                                                "UNION ALL\n"
                                                                                                                                                                                                                                                                                                                                                                                                                              f"SELECT 'macOS' AS operating_system, {macos} AS download_count\n"
                                                                                                                                                                                                                                                                                                                                                                                                                                            "UNION ALL\n"
                                                                                                                                                                                                                                                                                                                                                                                                                                                          f"SELECT 'Windows' AS operating_system, {windows} AS download_count"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              payload = json.dumps({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "query": {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "kind": "DataVisualizationNode",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "source": {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      "kind": "HogQLQuery",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "query": sql
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }).encode("utf-8")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                patch_req = urllib.request.Request(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "https://us.posthog.com/api/projects/355360/insights/7587728/",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            data=payload,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          headers={
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "Authorization": f"Bearer {os.environ['POSTHOG_API_KEY']}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "Content-Type": "application/json",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          method="PATCH"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with urllib.request.urlopen(patch_req) as resp:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            result = json.loads(resp.read())
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print(f"Updated PostHog insight: {result['name']}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    EOF

name: CI - Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libportaudio2 portaudio19-dev \
          libsdl2-dev libgl1-mesa-dev libglu1-mesa-dev

    - name: Setup ImGui
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Build
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)

    - name: Run Tests
      run: cd build && ./amplitron-tests

    - name: Upload Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: build/guitar-amp
        retention-days: 1

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install portaudio sdl2

    - name: Setup ImGui
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Build
      run: |
        HOMEBREW_PREFIX=$(brew --prefix)
        mkdir -p build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release \
          -DPORTAUDIO_INCLUDE_DIRS="$HOMEBREW_PREFIX/include" \
          -DPORTAUDIO_LIBRARIES="$HOMEBREW_PREFIX/lib/libportaudio.dylib" \
          -DSDL2_INCLUDE_DIRS="$HOMEBREW_PREFIX/include/SDL2" \
          -DSDL2_LIBRARIES="$HOMEBREW_PREFIX/lib/libSDL2.dylib" \
          ..
        make -j$(sysctl -n hw.ncpu)

    - name: Run Tests
      run: cd build && ./amplitron-tests

    - name: Collect Binaries
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p staging
        cp build/guitar-amp staging/
        HOMEBREW_PREFIX=$(brew --prefix)
        cp "$HOMEBREW_PREFIX/lib/libportaudio.2.dylib" staging/
        cp "$HOMEBREW_PREFIX/lib/libSDL2-2.0.0.dylib" staging/
        # Fix rpaths so binary finds dylibs next to itself
        install_name_tool -change "$HOMEBREW_PREFIX/lib/libportaudio.2.dylib" @executable_path/libportaudio.2.dylib staging/guitar-amp
        install_name_tool -change "$HOMEBREW_PREFIX/lib/libSDL2-2.0.0.dylib" @executable_path/libSDL2-2.0.0.dylib staging/guitar-amp
        otool -L staging/guitar-amp
        ls -la staging/

    - name: Upload Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: staging/
        retention-days: 1

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-portaudio
          mingw-w64-x86_64-SDL2
          make
          git

    - name: Setup ImGui
      shell: msys2 {0}
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir -p build && cd build
        cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        make -j8

    - name: Run Tests
      shell: msys2 {0}
      run: cd build && ./amplitron-tests.exe

    - name: Collect Binaries
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      shell: msys2 {0}
      run: |
        mkdir -p staging
        cp build/guitar-amp.exe staging/
        for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll SDL2.dll; do
          cp /mingw64/bin/$dll staging/ 2>/dev/null || true
        done
        cp /mingw64/bin/libportaudio*.dll staging/ 2>/dev/null || true
        ls -la staging/

    - name: Upload Build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: staging/
        retention-days: 1
